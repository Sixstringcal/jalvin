name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm --filter @jalvin/compiler --filter @jalvin/runtime --filter @jalvin/ui --filter @jalvin/vite-plugin --filter @jalvin/webpack-plugin --filter @jalvin/cli build

      - name: Test — compiler
        run: pnpm --filter @jalvin/compiler test
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Test — runtime stdlib
        run: pnpm --filter @jalvin/runtime test

      - name: Test — ui components
        run: pnpm --filter @jalvin/ui test
